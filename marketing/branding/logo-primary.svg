<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <defs>
    <!-- Gradient for the signal/node glow -->
    <radialGradient id="glowGreen" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00E676" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00E676" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowBlue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#448AFF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#448AFF" stop-opacity="0"/>
    </radialGradient>
    <!-- Primary brand gradient -->
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A237E"/>
      <stop offset="100%" stop-color="#283593"/>
    </linearGradient>
    <linearGradient id="trackGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#90CAF9" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#448AFF"/>
      <stop offset="100%" stop-color="#90CAF9" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00E676"/>
      <stop offset="100%" stop-color="#00C853"/>
    </linearGradient>
  </defs>

  <!-- ==================== ICON: Stellwerk Signal Tower ==================== -->
  <!-- Signal tower base structure -->
  <g id="signal-tower" transform="translate(60, 30)">
    <!-- Tower body - stylized signal box -->
    <rect x="30" y="80" width="100" height="140" rx="4" fill="#1A237E"/>
    <rect x="34" y="84" width="92" height="132" rx="2" fill="#283593"/>

    <!-- Tower roof -->
    <polygon points="20,80 80,45 140,80" fill="#1A237E"/>
    <polygon points="28,80 80,52 132,80" fill="#0D47A1"/>

    <!-- Window grid (control room windows) -->
    <rect x="42" y="92" width="24" height="20" rx="2" fill="#1A237E"/>
    <rect x="44" y="94" width="20" height="16" rx="1" fill="#0D47A1"/>
    <line x1="54" y1="94" x2="54" y2="110" stroke="#1A237E" stroke-width="1.5"/>
    <line x1="44" y1="102" x2="64" y2="102" stroke="#1A237E" stroke-width="1.5"/>

    <rect x="74" y="92" width="24" height="20" rx="2" fill="#1A237E"/>
    <rect x="76" y="94" width="20" height="16" rx="1" fill="#0D47A1"/>
    <line x1="86" y1="94" x2="86" y2="110" stroke="#1A237E" stroke-width="1.5"/>
    <line x1="76" y1="102" x2="96" y2="102" stroke="#1A237E" stroke-width="1.5"/>

    <rect x="106" y="92" width="24" height="20" rx="2" fill="#1A237E"/>
    <rect x="108" y="94" width="20" height="16" rx="1" fill="#0D47A1"/>
    <line x1="118" y1="94" x2="118" y2="110" stroke="#1A237E" stroke-width="1.5"/>
    <line x1="108" y1="102" x2="128" y2="102" stroke="#1A237E" stroke-width="1.5"/>

    <!-- Signal lever row (iconic Stellwerk element) -->
    <!-- Lever 1 -->
    <rect x="46" y="125" width="6" height="30" rx="2" fill="#448AFF"/>
    <circle cx="49" cy="123" r="5" fill="#448AFF"/>
    <!-- Lever 2 - active/green -->
    <rect x="62" y="120" width="6" height="35" rx="2" fill="#00E676"/>
    <circle cx="65" cy="118" r="5" fill="#00E676"/>
    <!-- Lever 3 -->
    <rect x="78" y="125" width="6" height="30" rx="2" fill="#448AFF"/>
    <circle cx="81" cy="123" r="5" fill="#448AFF"/>
    <!-- Lever 4 - active/green -->
    <rect x="94" y="120" width="6" height="35" rx="2" fill="#00E676"/>
    <circle cx="97" cy="118" r="5" fill="#00E676"/>
    <!-- Lever 5 -->
    <rect x="110" y="125" width="6" height="30" rx="2" fill="#448AFF"/>
    <circle cx="113" cy="123" r="5" fill="#448AFF"/>

    <!-- Neural network / AI overlay on tower -->
    <!-- Nodes -->
    <circle cx="49" cy="175" r="4" fill="#00E676" opacity="0.9"/>
    <circle cx="81" cy="168" r="4" fill="#448AFF" opacity="0.9"/>
    <circle cx="113" cy="175" r="4" fill="#00E676" opacity="0.9"/>
    <circle cx="65" cy="195" r="3.5" fill="#448AFF" opacity="0.8"/>
    <circle cx="97" cy="195" r="3.5" fill="#448AFF" opacity="0.8"/>
    <circle cx="81" cy="210" r="4" fill="#00E676" opacity="0.9"/>

    <!-- Neural connections -->
    <line x1="49" y1="175" x2="65" y2="195" stroke="#448AFF" stroke-width="1.2" opacity="0.6"/>
    <line x1="49" y1="175" x2="97" y2="195" stroke="#448AFF" stroke-width="1" opacity="0.4"/>
    <line x1="81" y1="168" x2="65" y2="195" stroke="#00E676" stroke-width="1.2" opacity="0.5"/>
    <line x1="81" y1="168" x2="97" y2="195" stroke="#00E676" stroke-width="1.2" opacity="0.5"/>
    <line x1="113" y1="175" x2="97" y2="195" stroke="#448AFF" stroke-width="1.2" opacity="0.6"/>
    <line x1="113" y1="175" x2="65" y2="195" stroke="#448AFF" stroke-width="1" opacity="0.4"/>
    <line x1="65" y1="195" x2="81" y2="210" stroke="#00E676" stroke-width="1.2" opacity="0.6"/>
    <line x1="97" y1="195" x2="81" y2="210" stroke="#00E676" stroke-width="1.2" opacity="0.6"/>

    <!-- Signal lights on top of tower -->
    <circle cx="60" cy="62" r="7" fill="#00E676"/>
    <circle cx="60" cy="62" r="12" fill="url(#glowGreen)"/>
    <circle cx="100" cy="62" r="7" fill="#448AFF"/>
    <circle cx="100" cy="62" r="12" fill="url(#glowBlue)"/>

    <!-- Track lines emerging from base -->
    <line x1="30" y1="220" x2="0" y2="240" stroke="url(#trackGrad)" stroke-width="3" stroke-linecap="round"/>
    <line x1="80" y1="220" x2="80" y2="245" stroke="url(#trackGrad)" stroke-width="3" stroke-linecap="round"/>
    <line x1="130" y1="220" x2="160" y2="240" stroke="url(#trackGrad)" stroke-width="3" stroke-linecap="round"/>

    <!-- Track cross-ties -->
    <line x1="-2" y1="232" x2="14" y2="225" stroke="#448AFF" stroke-width="1.5" opacity="0.5"/>
    <line x1="73" y1="232" x2="87" y2="232" stroke="#448AFF" stroke-width="1.5" opacity="0.5"/>
    <line x1="146" y1="225" x2="162" y2="232" stroke="#448AFF" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- ==================== WORDMARK ==================== -->
  <g transform="translate(270, 75)">
    <!-- "KI" in bold accent color -->
    <text x="0" y="72" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="88" font-weight="800" letter-spacing="-2" fill="#00E676">KI</text>

    <!-- "Stellwerk" in primary brand color -->
    <text x="120" y="72" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="88" font-weight="300" letter-spacing="-1" fill="#1A237E">Stellwerk</text>

    <!-- Tagline -->
    <text x="2" y="105" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="400" letter-spacing="6" fill="#546E7A">INTELLIGENZ AUF DEM RICHTIGEN GLEIS</text>

    <!-- Decorative track line under tagline -->
    <line x1="0" y1="115" x2="500" y2="115" stroke="#E0E0E0" stroke-width="1"/>
    <line x1="0" y1="115" x2="180" y2="115" stroke="url(#accentGrad)" stroke-width="2"/>
    <circle cx="180" cy="115" r="3" fill="#00E676"/>
  </g>
</svg>
