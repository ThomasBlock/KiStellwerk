<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="glowG" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00E676" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00E676" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#448AFF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#448AFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#90CAF9" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#448AFF"/>
      <stop offset="100%" stop-color="#90CAF9" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <!-- Signal tower icon - standalone -->
  <g transform="translate(30, 10)">
    <!-- Tower body -->
    <rect x="25" y="65" width="90" height="110" rx="4" fill="#1A237E"/>
    <rect x="29" y="69" width="82" height="102" rx="2" fill="#283593"/>

    <!-- Roof -->
    <polygon points="15,65 70,32 125,65" fill="#1A237E"/>
    <polygon points="22,65 70,38 118,65" fill="#0D47A1"/>

    <!-- Windows -->
    <rect x="35" y="76" width="20" height="16" rx="2" fill="#0D47A1"/>
    <line x1="45" y1="76" x2="45" y2="92" stroke="#1A237E" stroke-width="1.5"/>
    <line x1="35" y1="84" x2="55" y2="84" stroke="#1A237E" stroke-width="1.5"/>

    <rect x="62" y="76" width="20" height="16" rx="2" fill="#0D47A1"/>
    <line x1="72" y1="76" x2="72" y2="92" stroke="#1A237E" stroke-width="1.5"/>
    <line x1="62" y1="84" x2="82" y2="84" stroke="#1A237E" stroke-width="1.5"/>

    <rect x="89" y="76" width="20" height="16" rx="2" fill="#0D47A1"/>
    <line x1="99" y1="76" x2="99" y2="92" stroke="#1A237E" stroke-width="1.5"/>
    <line x1="89" y1="84" x2="109" y2="84" stroke="#1A237E" stroke-width="1.5"/>

    <!-- Signal levers -->
    <rect x="39" y="103" width="5" height="24" rx="2" fill="#448AFF"/>
    <circle cx="41.5" cy="101" r="4" fill="#448AFF"/>
    <rect x="53" y="99" width="5" height="28" rx="2" fill="#00E676"/>
    <circle cx="55.5" cy="97" r="4" fill="#00E676"/>
    <rect x="67" y="103" width="5" height="24" rx="2" fill="#448AFF"/>
    <circle cx="69.5" cy="101" r="4" fill="#448AFF"/>
    <rect x="81" y="99" width="5" height="28" rx="2" fill="#00E676"/>
    <circle cx="83.5" cy="97" r="4" fill="#00E676"/>
    <rect x="95" y="103" width="5" height="24" rx="2" fill="#448AFF"/>
    <circle cx="97.5" cy="101" r="4" fill="#448AFF"/>

    <!-- Neural network overlay -->
    <circle cx="41" cy="140" r="3.5" fill="#00E676" opacity="0.9"/>
    <circle cx="70" cy="135" r="3.5" fill="#448AFF" opacity="0.9"/>
    <circle cx="98" cy="140" r="3.5" fill="#00E676" opacity="0.9"/>
    <circle cx="55" cy="155" r="3" fill="#448AFF" opacity="0.8"/>
    <circle cx="84" cy="155" r="3" fill="#448AFF" opacity="0.8"/>
    <circle cx="70" cy="168" r="3.5" fill="#00E676" opacity="0.9"/>

    <line x1="41" y1="140" x2="55" y2="155" stroke="#448AFF" stroke-width="1" opacity="0.6"/>
    <line x1="41" y1="140" x2="84" y2="155" stroke="#448AFF" stroke-width="0.8" opacity="0.3"/>
    <line x1="70" y1="135" x2="55" y2="155" stroke="#00E676" stroke-width="1" opacity="0.5"/>
    <line x1="70" y1="135" x2="84" y2="155" stroke="#00E676" stroke-width="1" opacity="0.5"/>
    <line x1="98" y1="140" x2="84" y2="155" stroke="#448AFF" stroke-width="1" opacity="0.6"/>
    <line x1="98" y1="140" x2="55" y2="155" stroke="#448AFF" stroke-width="0.8" opacity="0.3"/>
    <line x1="55" y1="155" x2="70" y2="168" stroke="#00E676" stroke-width="1" opacity="0.6"/>
    <line x1="84" y1="155" x2="70" y2="168" stroke="#00E676" stroke-width="1" opacity="0.6"/>

    <!-- Signal lights -->
    <circle cx="52" cy="48" r="6" fill="#00E676"/>
    <circle cx="52" cy="48" r="10" fill="url(#glowG)"/>
    <circle cx="88" cy="48" r="6" fill="#448AFF"/>
    <circle cx="88" cy="48" r="10" fill="url(#glowB)"/>

    <!-- Track lines -->
    <line x1="25" y1="175" x2="0" y2="190" stroke="url(#tGrad)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="70" y1="175" x2="70" y2="192" stroke="url(#tGrad)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="115" y1="175" x2="140" y2="190" stroke="url(#tGrad)" stroke-width="2.5" stroke-linecap="round"/>
  </g>
</svg>
